# Generated by run.sh — publishes ports + forwards host AWS creds for local runs.
services:
  backend:
    ports:
      - "8080:8080"
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
  dashboard:
    ports:
      - "3000:3000"
